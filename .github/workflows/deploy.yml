name: Deploy to Server

on:
  release:
    types: [published]

jobs:
  deploy:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: self-hosted
    container:
      images: ubuntu:22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upadaate Service
        run: |
          echo "Release ${{ github.event.release.tag_name}} detected"
          cd /home/sora81dev/discord-bot/nanase-bot
          git reset --hard HEAD
          git pull origin main
          docker compose up -d --build
